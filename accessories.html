<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ACCESSORIES — Ashburn Cigar & Vape</title>
  <link href="https://fonts.googleapis.com/css2?family=Bagel+Fat+One&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a10;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
    }
    .back {
      align-self: flex-start;
      color: #ff2d55;
      text-decoration: none;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 48px;
      opacity: 0.8;
      transition: opacity 0.2s;
    }
    .back:hover { opacity: 1; }
    .back::before { content: "← "; }
    h1 {
      font-family: 'Bagel Fat One', cursive;
      font-size: clamp(48px, 12vw, 96px);
      color: #ff2d55;
      text-shadow: 0 0 30px #ff2d5588, 0 0 60px #ff2d5544;
      letter-spacing: 0.04em;
      margin-bottom: 16px;
      text-align: center;
    }
    .sub {
      font-size: 13px;
      color: #555;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 64px;
    }
    .placeholder-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 16px;
      width: 100%;
      max-width: 900px;
    }
    .card {
      background: #12121a;
      border: 1.5px solid #ff2d5544;
      border-radius: 16px;
      padding: 32px 20px;
      text-align: center;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .card:hover {
      border-color: #ff2d55;
      box-shadow: 0 0 20px #ff2d5533;
    }
    .card-icon { font-size: 32px; margin-bottom: 12px; }
    .card-name {
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #888;
    }
    .coming-soon {
      margin-top: 80px;
      font-size: 12px;
      color: #333;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <a class="back" href="index.html">Back</a>
  <h1>ACCESSORIES</h1>
  <p class="sub">Ashburn Cigar &amp; Vape &middot; 44110 Ashburn Village Blvd</p>
  <div class="placeholder-grid">
    <div class="card"><div class="card-icon">✨</div><div class="card-name">Product Coming Soon</div></div>
    <div class="card"><div class="card-icon">✨</div><div class="card-name">Product Coming Soon</div></div>
    <div class="card"><div class="card-icon">✨</div><div class="card-name">Product Coming Soon</div></div>
    <div class="card"><div class="card-icon">✨</div><div class="card-name">Product Coming Soon</div></div>
    <div class="card"><div class="card-icon">✨</div><div class="card-name">Product Coming Soon</div></div>
    <div class="card"><div class="card-icon">✨</div><div class="card-name">Product Coming Soon</div></div>
  </div>
  <p class="coming-soon">Product list coming soon — send inventory to finalize</p>
</body>
</html>
